<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sherlock</title>
        <link rel="stylesheet" href="/static/style.css">
        <link rel="icon" type="image/x-icon" href="/static/favicon.png">
        <script src="/static/app.js" defer></script>
    </head>
    
    <body>
        <button id="menu_toggle" class="btn-ghost" aria-label="Menu">☰</button>
        <aside id="menu_drawer">
            <h2>Uploaded Case Files</h2>
            <ul id="file_list"></ul>
        </aside>

        <h1>
            Welcome Detective
        </h1>

<!-- Chat queued questions on the left and conversation on the right -->
        <div id="chat_layout">
            <aside id="queue_panel">
                <h2>Queued Messages</h2>
                <ul id="queue_list"></ul>
            </aside>
            <div id="chat_box"></div>
        </div>

        <form id="question_form">
            <label for="question">Question:</label>
            <input type="text" id="question" name="question" placeholder="Ask a question or type '/clear' to reset chat">
            <button type="submit">Ask</button>
        </form>

<!-- File upload + management -->
        <form id="upload_file">
            <input type="file" id="file_upload" name="file">
            <button type="submit">Upload Document</button>
            <progress id="upload_progress" hidden></progress>
        </form>

        <button class="btn-ghost" onclick="if(confirm('Are you sure? This will delete all the case files')) fetch('/delete_files', { method: 'DELETE' })">Delete All Files</button>
    </body>
</html>
