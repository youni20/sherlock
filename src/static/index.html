<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sherlock</title>
    </head>
    <body>
        <h1>
            Welcome, Please Enter Your Question
        </h1>

<!-- Queue for handling Messages -->
        <script>
            class Queue{
            constructor(){
                this.items = [];
            }
            enqueue(item){
                this.items.push(item);
            }
            dequeue(){
              return this.isEmpty() ? null : this.items.shift() 
            }
            peek(){
                return this.isEmpty() ? null : this.items[0];
            }
            isEmpty(){
                return this.items.length === 0;
            }
        }
        </script>

        
<!-- Logic for submiting questions -->        
        <div id="chat_box"></div>

        <form id="question_form">
            <label for="question">Question:</label>
            <input type="text" id="question" name="question" placeholder="type '/exit' to close the program">
            <button type="submit">Ask</button>
        </form>

        <script>
        questionQueue = new Queue();
        
        document.getElementById("question_form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const question = document.getElementById("question").value.trim();
          if (!question) return;

          document.getElementById("chat_box").innerHTML += `<p>You: ${question}</p>`;
          document.getElementById("question_form").reset();

          questionQueue.enqueue(question);
          // TODO: queue processing logic here
        });
        </script>

        
<!-- Logic for uploading files -->
        <form id="upload_file">
            <input type="file" id="file_upload" name="file">
            <button type="submit">Upload Document</button>
        </form>

        <script>
        
        document.getElementById("upload_file").addEventListener("submit", async (e) => {
          e.preventDefault();
          const data = new FormData();
          data.append("file", document.getElementById("file_upload").files[0]);

          const response = await fetch("/ingest_file", {
            method: "POST",
            body: data,
          })
          console.log(await response.json());
        });
        </script>
    </body>
</html>
